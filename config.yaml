substitutions:
  device_name: velaflame
  friendly_name: VelaFlame

packages:
  velaflame:
    url: https://github.com/alvarezb/velaflame
    ref: main
    files:
      - esphome/velaflame.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:

api:
  encryption:
    key: "InsertYourEncryptionKeyHere"

ota:
  - platform: esphome
    password: "InsertYourOTAPasswordHere"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback Hotspot"
    password: "InsertYourAPPasswordHere"

captive_portal:
