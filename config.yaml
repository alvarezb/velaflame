substitutions:
  device_name: velaflame
  friendly_name: VelaFlame

  # Replace with real keys!! This is just a random key so it will compile.
  # If you add a "new" device in the ESPHome Builder, it will generate
  # and cache new encryption keys for you, copy those into these fields.
  api_encryption_key: "cPlJ498NVOuOHA3uIQM5FoR2NLqzQvlLaa9CKUq8hkY="
  ota_password: "ota_password_here"
  wifi_ap_password: "wifi_ap_password_here"

packages:
  velaflame:
    url: https://github.com/alvarezb/velaflame
    ref: main
    files:
      - esphome/velaflame.yaml

logger:

api:
  encryption:
    key: ${api_encryption_key}

ota:
  - platform: esphome
    password: ${ota_password}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback Hotspot"
    password: ${wifi_ap_password}

captive_portal:
