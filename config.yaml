substitutions:
  device_name: velaflame06
  friendly_name: VelaFlame06
  api_encryption_key: "api_key_here"
  ota_password: "ota_password_here"
  wifi_ap_password: "wifi_ap_password_here"

packages:
  velaflame:
    url: https://github.com/alvarezb/velaflame
    ref: main
    files:
      - esphome/velaflame.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:

api:
  encryption:
    key: ${api_encryption_key}

ota:
  - platform: esphome
    password: ${ota_password}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback Hotspot"
    password: ${wifi_ap_password}

captive_portal:
