substitutions:
  device_name: velaflame
  friendly_name: VelaFlame

external_components:
  - source:
      type: git
      url: https://github.com/alvarezb/velaflame
      ref: main
    components: [tlc59116]
    refresh: always

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

i2c:
  sda: GPIO01
  scl: GPIO04
  scan: True
  frequency: 100kHz

tlc59116:
  address: 0x60
  enable_pin: GPIO10

output:
  # DRV8210P H-bridge for wick electromagnet
  # https://www.ti.com/lit/ds/symlink/drv8210p.pdf
  - platform: gpio
    pin: GPIO19
    id: hbridge_nsleep
  - platform: ledc
    pin: GPIO03
    id: hbridge_in1
    frequency: 25000Hz
  - platform: ledc
    pin: GPIO00
    id: hbridge_in2
    frequency: 25000Hz
  # D2: RGBW
  - platform: tlc59116
    channel: 0
    id: d2_r
  - platform: tlc59116
    channel: 1
    id: d2_g
  - platform: tlc59116
    channel: 2
    id: d2_b
  - platform: tlc59116
    channel: 3
    id: d2_w
  # D3: RGBW
  - platform: tlc59116
    channel: 5
    id: d3_r
  - platform: tlc59116
    channel: 6
    id: d3_g
  - platform: tlc59116
    channel: 8
    id: d3_b
  - platform: tlc59116
    channel: 9
    id: d3_w
  # D4: RGBW
  - platform: tlc59116
    channel: 12
    id: d4_r
  - platform: tlc59116
    channel: 13
    id: d4_g
  - platform: tlc59116
    channel: 14
    id: d4_b
  - platform: tlc59116
    channel: 15
    id: d4_w
  # Combined outputs - fan out to all 3 LEDs
  - platform: template
    id: all_r
    type: float
    write_action:
      - output.set_level:
          id: d2_r
          level: !lambda "return state;"
      - output.set_level:
          id: d3_r
          level: !lambda "return state;"
      - output.set_level:
          id: d4_r
          level: !lambda "return state;"
  - platform: template
    id: all_g
    type: float
    write_action:
      - output.set_level:
          id: d2_g
          level: !lambda "return state;"
      - output.set_level:
          id: d3_g
          level: !lambda "return state;"
      - output.set_level:
          id: d4_g
          level: !lambda "return state;"
  - platform: template
    id: all_b
    type: float
    write_action:
      - output.set_level:
          id: d2_b
          level: !lambda "return state;"
      - output.set_level:
          id: d3_b
          level: !lambda "return state;"
      - output.set_level:
          id: d4_b
          level: !lambda "return state;"
  - platform: template
    id: all_w
    type: float
    write_action:
      - output.set_level:
          id: d2_w
          level: !lambda "return state;"
      - output.set_level:
          id: d3_w
          level: !lambda "return state;"
      - output.set_level:
          id: d4_w
          level: !lambda "return state;"

light:
  # Main combined light
  - platform: rgbw
    name: "${friendly_name}"
    id: light_main
    red: all_r
    green: all_g
    blue: all_b
    white: all_w
    gamma_correct: 2.0
    effects:
      - lambda:
          name: "Candle Flicker"
          update_interval: 50ms
          lambda: |-
            // ── Static state: base flicker ──
            static float slow_b      = 1.0f;
            static float fast_b      = 1.0f;
            static float slow_target = 1.0f;
            static int   slow_timer  = 0;
            // ── Static state: per-LED directional lean ──
            static float lean_d2 = 1.0f, lean_d3 = 1.0f, lean_d4 = 1.0f;
            static float lean_tgt_d2 = 1.0f, lean_tgt_d3 = 1.0f, lean_tgt_d4 = 1.0f;
            static int   lean_timer  = 0;

            float wind = id(candle_intensity).state;

            // ── Slow gust layer: retarget every ~500ms (10 ticks × 50ms) ──
            slow_timer++;
            if (slow_timer >= 10) {
              slow_timer = 0;
              float r = (float)(rand() % 1000) / 1000.0f;
              r = r * r * r;  // cubic: mostly near 1.0, rare dramatic dips
              slow_target = 1.0f - r * (wind * 0.6f);
            }
            // Asymmetric smoothing: slow to dim, fast to recover
            float alpha = (slow_b > slow_target) ? (0.08f + wind * 0.12f) : 0.30f;
            slow_b = slow_b * (1.0f - alpha) + slow_target * alpha;

            // ── Fast jitter layer: small turbulence every tick ──
            float fast_noise = (float)(rand() % 1000) / 1000.0f;
            float fast_target = 1.0f - fast_noise * (wind * 0.10f);
            fast_b = fast_b * 0.65f + fast_target * 0.35f;

            float bri_mult = slow_b * fast_b;
            if (bri_mult < 0.05f) bri_mult = 0.05f;
            if (bri_mult > 1.0f)  bri_mult = 1.0f;

            // ── Per-LED lean: retarget every ~2s (40 ticks) ──
            lean_timer++;
            if (lean_timer >= 40) {
              lean_timer = 0;
              float lr = wind * 0.25f;
              lean_tgt_d2 = 1.0f + ((float)(rand() % 1000) / 500.0f - 1.0f) * lr;
              lean_tgt_d3 = 1.0f + ((float)(rand() % 1000) / 500.0f - 1.0f) * lr;
              lean_tgt_d4 = 1.0f + ((float)(rand() % 1000) / 500.0f - 1.0f) * lr;
            }
            lean_d2 = lean_d2 * 0.96f + lean_tgt_d2 * 0.04f;
            lean_d3 = lean_d3 * 0.96f + lean_tgt_d3 * 0.04f;
            lean_d4 = lean_d4 * 0.96f + lean_tgt_d4 * 0.04f;

            // ── Read user base color (remote_values stable because publish=false) ──
            float rem_bri = id(light_main).remote_values.get_brightness();
            float rem_col = id(light_main).remote_values.get_color_brightness();
            float rem_r   = id(light_main).remote_values.get_red();
            float rem_g   = id(light_main).remote_values.get_green();
            float rem_bv  = id(light_main).remote_values.get_blue();
            float rem_w   = id(light_main).remote_values.get_white();

            // ── Convert base RGB to HSV ──
            // ESPHome normalizes so at least one channel = 1.0, giving val_h ≈ 1.0
            float cmax = rem_r; if (rem_g > cmax) cmax = rem_g; if (rem_bv > cmax) cmax = rem_bv;
            float cmin = rem_r; if (rem_g < cmin) cmin = rem_g; if (rem_bv < cmin) cmin = rem_bv;
            float delta = cmax - cmin;
            float hue = 0.0f;
            float sat = (cmax > 0.001f) ? (delta / cmax) : 0.0f;
            float val_h = cmax;
            if (delta > 0.001f) {
              if      (cmax == rem_r) hue = fmod((rem_g - rem_bv) / delta, 6.0f) / 6.0f;
              else if (cmax == rem_g) hue = ((rem_bv - rem_r)  / delta + 2.0f) / 6.0f;
              else                   hue = ((rem_r  - rem_g)   / delta + 4.0f) / 6.0f;
              if (hue < 0.0f) hue += 1.0f;
            }

            // ── Wavelength-based hue shift ──
            // Dim → lower hue (longer wavelength): yellow→orange, blue→teal, purple→blue
            // Bright-side lean → slightly shorter wavelength (hotter); dim-side → longer
            float global_hue_shift = -(1.0f - bri_mult) * wind * 0.04f;

            // ── Per-LED output: apply lean + hue shift, convert to RGB, apply gamma, set outputs ──
            // gamma = 2.0 → output = val * val
            // Directly drives all 12 channels, bypassing the all_r/g/b/w fan-out
            {
              float lean = lean_d2;
              float led_hue = hue + global_hue_shift + (lean - 1.0f) * wind * 0.02f;
              if (led_hue < 0.0f) led_hue = 0.0f;
              if (led_hue > 1.0f) led_hue = 1.0f;
              float h6 = led_hue * 6.0f; int hi = (int)h6; float f = h6 - (float)hi;
              float p = val_h*(1.0f-sat), q = val_h*(1.0f-sat*f), t = val_h*(1.0f-sat*(1.0f-f));
              float cr, cg, cb;
              switch (hi % 6) {
                case 0: cr=val_h; cg=t;     cb=p;     break;
                case 1: cr=q;     cg=val_h; cb=p;     break;
                case 2: cr=p;     cg=val_h; cb=t;     break;
                case 3: cr=p;     cg=q;     cb=val_h; break;
                case 4: cr=t;     cg=p;     cb=val_h; break;
                default:cr=val_h; cg=p;     cb=q;     break;
              }
              float scale = rem_bri * bri_mult * lean * rem_col; if (scale > 1.0f) scale = 1.0f;
              float wscale = rem_bri * bri_mult * lean * rem_w;  if (wscale > 1.0f) wscale = 1.0f;
              float v;
              v = scale * cr;  id(d2_r).set_level(v * v);
              v = scale * cg;  id(d2_g).set_level(v * v);
              v = scale * cb;  id(d2_b).set_level(v * v);
              v = wscale;      id(d2_w).set_level(v * v);
            }
            {
              float lean = lean_d3;
              float led_hue = hue + global_hue_shift + (lean - 1.0f) * wind * 0.02f;
              if (led_hue < 0.0f) led_hue = 0.0f;
              if (led_hue > 1.0f) led_hue = 1.0f;
              float h6 = led_hue * 6.0f; int hi = (int)h6; float f = h6 - (float)hi;
              float p = val_h*(1.0f-sat), q = val_h*(1.0f-sat*f), t = val_h*(1.0f-sat*(1.0f-f));
              float cr, cg, cb;
              switch (hi % 6) {
                case 0: cr=val_h; cg=t;     cb=p;     break;
                case 1: cr=q;     cg=val_h; cb=p;     break;
                case 2: cr=p;     cg=val_h; cb=t;     break;
                case 3: cr=p;     cg=q;     cb=val_h; break;
                case 4: cr=t;     cg=p;     cb=val_h; break;
                default:cr=val_h; cg=p;     cb=q;     break;
              }
              float scale = rem_bri * bri_mult * lean * rem_col; if (scale > 1.0f) scale = 1.0f;
              float wscale = rem_bri * bri_mult * lean * rem_w;  if (wscale > 1.0f) wscale = 1.0f;
              float v;
              v = scale * cr;  id(d3_r).set_level(v * v);
              v = scale * cg;  id(d3_g).set_level(v * v);
              v = scale * cb;  id(d3_b).set_level(v * v);
              v = wscale;      id(d3_w).set_level(v * v);
            }
            {
              float lean = lean_d4;
              float led_hue = hue + global_hue_shift + (lean - 1.0f) * wind * 0.02f;
              if (led_hue < 0.0f) led_hue = 0.0f;
              if (led_hue > 1.0f) led_hue = 1.0f;
              float h6 = led_hue * 6.0f; int hi = (int)h6; float f = h6 - (float)hi;
              float p = val_h*(1.0f-sat), q = val_h*(1.0f-sat*f), t = val_h*(1.0f-sat*(1.0f-f));
              float cr, cg, cb;
              switch (hi % 6) {
                case 0: cr=val_h; cg=t;     cb=p;     break;
                case 1: cr=q;     cg=val_h; cb=p;     break;
                case 2: cr=p;     cg=val_h; cb=t;     break;
                case 3: cr=p;     cg=q;     cb=val_h; break;
                case 4: cr=t;     cg=p;     cb=val_h; break;
                default:cr=val_h; cg=p;     cb=q;     break;
              }
              float scale = rem_bri * bri_mult * lean * rem_col; if (scale > 1.0f) scale = 1.0f;
              float wscale = rem_bri * bri_mult * lean * rem_w;  if (wscale > 1.0f) wscale = 1.0f;
              float v;
              v = scale * cr;  id(d4_r).set_level(v * v);
              v = scale * cg;  id(d4_g).set_level(v * v);
              v = scale * cb;  id(d4_b).set_level(v * v);
              v = wscale;      id(d4_w).set_level(v * v);
            }
  # Individual LEDs (hidden by default, for advanced per-LED control)
  - platform: rgbw
    name: "${friendly_name} D2"
    id: light_d2
    red: d2_r
    green: d2_g
    blue: d2_b
    white: d2_w
    disabled_by_default: True
    gamma_correct: 2.0
    effects:
      - lambda:
          name: "Candle Flicker"
          update_interval: 50ms
          lambda: |-
            static float smooth = 1.0f;
            float wind = id(candle_intensity).state;
            float flicker = (float)(rand() % 1000) / 1000.0f;
            float min_b = 1.0f - wind * 0.7f;
            float target = min_b + flicker * (1.0f - min_b);
            float alpha = 0.15f + wind * 0.35f;
            smooth = smooth * (1.0f - alpha) + target * alpha;
            auto call = id(light_d2).turn_on();
            call.set_brightness(id(light_d2).remote_values.get_brightness() * smooth);
            call.set_transition_length(0);
            call.set_publish(false);
            call.set_save(false);
            call.perform();
  - platform: rgbw
    name: "${friendly_name} D3"
    id: light_d3
    red: d3_r
    green: d3_g
    blue: d3_b
    white: d3_w
    disabled_by_default: True
    gamma_correct: 2.0
    effects:
      - lambda:
          name: "Candle Flicker"
          update_interval: 50ms
          lambda: |-
            static float smooth = 1.0f;
            float wind = id(candle_intensity).state;
            float flicker = (float)(rand() % 1000) / 1000.0f;
            float min_b = 1.0f - wind * 0.7f;
            float target = min_b + flicker * (1.0f - min_b);
            float alpha = 0.15f + wind * 0.35f;
            smooth = smooth * (1.0f - alpha) + target * alpha;
            auto call = id(light_d3).turn_on();
            call.set_brightness(id(light_d3).remote_values.get_brightness() * smooth);
            call.set_transition_length(0);
            call.set_publish(false);
            call.set_save(false);
            call.perform();
  - platform: rgbw
    name: "${friendly_name} D4"
    id: light_d4
    red: d4_r
    green: d4_g
    blue: d4_b
    white: d4_w
    disabled_by_default: True
    gamma_correct: 2.0
    effects:
      - lambda:
          name: "Candle Flicker"
          update_interval: 50ms
          lambda: |-
            static float smooth = 1.0f;
            float wind = id(candle_intensity).state;
            float flicker = (float)(rand() % 1000) / 1000.0f;
            float min_b = 1.0f - wind * 0.7f;
            float target = min_b + flicker * (1.0f - min_b);
            float alpha = 0.15f + wind * 0.35f;
            smooth = smooth * (1.0f - alpha) + target * alpha;
            auto call = id(light_d4).turn_on();
            call.set_brightness(id(light_d4).remote_values.get_brightness() * smooth);
            call.set_transition_length(0);
            call.set_publish(false);
            call.set_save(false);
            call.perform();

globals:
  - id: flicker_running
    type: bool
    restore_value: no
    initial_value: "false"

number:
  - platform: template
    name: "Candle Flicker Intensity"
    id: candle_intensity
    min_value: 0.4
    max_value: 1.0
    step: 0.05
    initial_value: 0.5
    optimistic: True
    restore_value: True
    icon: "mdi:weather-windy"
  - platform: template
    name: "Wick Pulse Duration"
    id: pulse_duration
    min_value: 10
    max_value: 500
    step: 10
    initial_value: 200
    unit_of_measurement: ms
    optimistic: True
    restore_value: True
  - platform: template
    name: "Wick Flicker Intensity"
    id: flicker_intensity
    min_value: 0.1
    max_value: 1.0
    step: 0.05
    initial_value: 0.5
    optimistic: True
    restore_value: True
  - platform: template
    name: "Wick Flicker Min Interval"
    id: flicker_min_interval
    min_value: 10
    max_value: 500
    step: 10
    initial_value: 100
    unit_of_measurement: ms
    optimistic: True
    restore_value: True
  - platform: template
    name: "Wick Flicker Max Interval"
    id: flicker_max_interval
    min_value: 10
    max_value: 1000
    step: 10
    initial_value: 500
    unit_of_measurement: ms
    optimistic: True
    restore_value: True

button:
  - platform: template
    name: "Wick Pulse"
    on_press:
      - script.execute: pulse_wick

switch:
  - platform: template
    name: "Wick Flicker"
    id: flicker_switch
    optimistic: True
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - globals.set:
          id: flicker_running
          value: "true"
      - output.turn_on: hbridge_nsleep
      - script.execute: flicker_loop
    turn_off_action:
      - globals.set:
          id: flicker_running
          value: "false"
      - script.stop: flicker_loop
      - output.set_level:
          id: hbridge_in1
          level: 0
      - output.set_level:
          id: hbridge_in2
          level: 0
      - output.turn_off: hbridge_nsleep

script:
  - id: pulse_wick
    mode: single
    then:
      - output.turn_on: hbridge_nsleep
      - output.set_level:
          id: hbridge_in2
          level: 0
      - output.set_level:
          id: hbridge_in1
          level: !lambda "return id(flicker_intensity).state;"
      - delay: !lambda "return (int)id(pulse_duration).state;"
      - output.set_level:
          id: hbridge_in1
          level: 0
      - output.set_level:
          id: hbridge_in2
          level: 0
      # Sleep the driver if flicker isn't running
      - if:
          condition:
            lambda: "return !id(flicker_running);"
          then:
            - output.turn_off: hbridge_nsleep

  - id: flicker_loop
    mode: single
    then:
      - while:
          condition:
            lambda: "return id(flicker_running);"
          then:
            - script.execute: pulse_wick
            - script.wait: pulse_wick
            - delay: !lambda |-
                int min_ms = (int)id(flicker_min_interval).state;
                int max_ms = (int)id(flicker_max_interval).state;
                if (max_ms <= min_ms) max_ms = min_ms + 100;
                return min_ms + random(max_ms - min_ms);

# LED Driver info:
# https://www.ti.com/lit/ds/symlink/tlc59116.pdf
# addresses: 0x60, 0x68, 0x6b
# 0x6b is probably startup master addr.

# Channels:
# D2: R: 0, G: 1, B: 2, W: 3
# D3: R: 5, G: 6, B: 8, W: 9
# D4: R: 12, G: 13, B: 14, W: 15
# Not used: 4, 7, 10, 11
