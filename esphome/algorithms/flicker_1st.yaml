#
# Candle Flicker effect for the main 3-LED combined light (light_main).
#
# Inputs (from velaflame.yaml):
#   id(candle_intensity)  - 0.4–1.0 wind/turbulence strength
#   id(light_main)        - the combined RGBW light (remote_values = user color/brightness)
#   id(d2_r/g/b/w) … id(d4_r/g/b/w) - per-LED hardware outputs
#
# Algorithm overview:
#   1. Slow gust layer   — retargets ~every 500ms; cubic distribution for rare deep dips
#   2. Fast jitter layer — every tick, small turbulence
#   3. Flame lean        — random-walk angle distributes brightness across D2/D3/D4
#   4. HSV color shift   — cooler/dimmer LEDs shift hue toward longer wavelengths and
#                          gain saturation (Bezold-Brücke / Abney effects)

lambda:
  name: "1st flicker"
  update_interval: 50ms
  lambda: |-
      // ── Static state: base flicker ──
      static float slow_b      = 1.0f;
      static float fast_b      = 1.0f;
      static float slow_target = 1.0f;
      static int   slow_timer  = 0;
      // ── Static state: lean angle (which LED faces the flame) ──
      static float lean_angle  = 0.0f;

      float wind = id(candle_intensity).state;

      // ── Slow gust layer: retarget every ~500ms (10 ticks × 50ms) ──
      slow_timer++;
      if (slow_timer >= 10) {
        slow_timer = 0;
        float r = (float)(rand() % 1000) / 1000.0f;
        r = r * r * r;  // cubic: mostly near 1.0, rare dramatic dips
        slow_target = 1.0f - r * (wind * 0.35f);
      }
      // Asymmetric smoothing: slow to dim, fast to recover
      float alpha = (slow_b > slow_target) ? (0.08f + wind * 0.12f) : 0.30f;
      slow_b = slow_b * (1.0f - alpha) + slow_target * alpha;

      // ── Fast jitter layer: small turbulence every tick ──
      float fast_noise = (float)(rand() % 1000) / 1000.0f;
      float fast_target = 1.0f - fast_noise * (wind * 0.06f);
      fast_b = fast_b * 0.65f + fast_target * 0.35f;

      float bri_mult = slow_b * fast_b;
      if (bri_mult < 0.15f) bri_mult = 0.15f;
      if (bri_mult > 1.0f)  bri_mult = 1.0f;

      // ── Flame lean: random-walk angle around the wick triangle ──
      // D2/D3/D4 are 120° apart; projecting onto them guarantees one is always
      // brighter and one always dimmer — no more three-way ties
      // Advance ~2.5°/tick = full rotation in ~144 ticks = ~7s; jitter for organic feel
      lean_angle += 2.5f + ((float)(rand() % 1000) / 500.0f - 1.0f) * 1.5f;
      if (lean_angle >= 360.0f) lean_angle -= 360.0f;
      if (lean_angle <    0.0f) lean_angle += 360.0f;

      const float D2R = 0.017453293f;
      float raw2 = cosf(lean_angle * D2R) * 0.5f + 0.5f;
      float raw3 = cosf((lean_angle + 120.0f) * D2R) * 0.5f + 0.5f;
      float raw4 = cosf((lean_angle + 240.0f) * D2R) * 0.5f + 0.5f;
      float rmax = raw2; if (raw3 > rmax) rmax = raw3; if (raw4 > rmax) rmax = raw4;
      if (rmax < 0.001f) rmax = 0.001f;
      float lean_amp = wind * 0.45f;  // hot LED at 1.0, coldest at 1.0 - lean_amp
      float lean_d2 = 1.0f - lean_amp * (1.0f - raw2 / rmax);
      float lean_d3 = 1.0f - lean_amp * (1.0f - raw3 / rmax);
      float lean_d4 = 1.0f - lean_amp * (1.0f - raw4 / rmax);

      // ── Skip output writes during color/brightness transitions ──
      // ESPHome's transition system writes uniform color to all_r/g/b/w (fan-out) at
      // the main loop rate. Our per-LED writes only happen every 50ms, so between
      // our writes the transition overwrites our values — causing strobing.
      // Fix: detect an active transition by comparing current vs remote values,
      // and yield to the transition. Internal state (flicker, lean) keeps advancing.
      {
        float tr = fabsf(id(light_main).current_values.get_brightness() - id(light_main).remote_values.get_brightness())
                 + fabsf(id(light_main).current_values.get_red()        - id(light_main).remote_values.get_red())
                 + fabsf(id(light_main).current_values.get_green()      - id(light_main).remote_values.get_green())
                 + fabsf(id(light_main).current_values.get_blue()       - id(light_main).remote_values.get_blue())
                 + fabsf(id(light_main).current_values.get_white()      - id(light_main).remote_values.get_white());
        if (tr > 0.02f) return;
      }

      // ── Read user base color (remote_values stable because publish=false) ──
      float rem_bri = id(light_main).remote_values.get_brightness();
      float rem_col = id(light_main).remote_values.get_color_brightness();
      float rem_r   = id(light_main).remote_values.get_red();
      float rem_g   = id(light_main).remote_values.get_green();
      float rem_bv  = id(light_main).remote_values.get_blue();
      float rem_w   = id(light_main).remote_values.get_white();

      // ── Convert base RGB to HSV ──
      // ESPHome normalizes so at least one channel = 1.0, giving val_h ≈ 1.0
      float cmax = rem_r; if (rem_g > cmax) cmax = rem_g; if (rem_bv > cmax) cmax = rem_bv;
      float cmin = rem_r; if (rem_g < cmin) cmin = rem_g; if (rem_bv < cmin) cmin = rem_bv;
      float delta = cmax - cmin;
      float hue = 0.0f;
      float sat = (cmax > 0.001f) ? (delta / cmax) : 0.0f;
      float val_h = cmax;
      if (delta > 0.001f) {
        if      (cmax == rem_r) hue = fmod((rem_g - rem_bv) / delta, 6.0f) / 6.0f;
        else if (cmax == rem_g) hue = ((rem_bv - rem_r)  / delta + 2.0f) / 6.0f;
        else                    hue = ((rem_r  - rem_g)   / delta + 4.0f) / 6.0f;
        if (hue < 0.0f) hue += 1.0f;
      }

      // ── Wavelength-based hue + saturation shift ──
      // Dim → lower hue (longer wavelength): yellow→orange, blue→teal, purple→blue
      // Dim → higher saturation: colors deepen as the flame cools
      float global_hue_shift = -(1.0f - bri_mult) * wind * 0.10f;
      float global_sat_boost = (1.0f - bri_mult) * wind * 0.20f;

      // ── Per-LED output: apply lean + hue/sat shift, convert to RGB, gamma, set outputs ──
      // Hot LED (lean=1.0): no extra shift. Cool LED (lean<1.0): extra redward + more saturated.
      // gamma = 2.0 → output = val * val; directly drives all 12 channels.
      {
        float lean = lean_d2;
        float led_hue = hue + global_hue_shift + (lean - 1.0f) * wind * 0.05f;
        if (led_hue < 0.0f) led_hue = 0.0f;
        if (led_hue > 1.0f) led_hue = 1.0f;
        float sat_led = sat + global_sat_boost + (1.0f - lean) * wind * 0.10f;
        if (sat_led > 1.0f) sat_led = 1.0f;
        float h6 = led_hue * 6.0f; int hi = (int)h6; float f = h6 - (float)hi;
        float p = val_h*(1.0f-sat_led), q = val_h*(1.0f-sat_led*f), t = val_h*(1.0f-sat_led*(1.0f-f));
        float cr, cg, cb;
        switch (hi % 6) {
          case 0: cr=val_h; cg=t;     cb=p;     break;
          case 1: cr=q;     cg=val_h; cb=p;     break;
          case 2: cr=p;     cg=val_h; cb=t;     break;
          case 3: cr=p;     cg=q;     cb=val_h; break;
          case 4: cr=t;     cg=p;     cb=val_h; break;
          default:cr=val_h; cg=p;     cb=q;     break;
        }
        float scale = rem_bri * bri_mult * lean * rem_col; if (scale > 1.0f) scale = 1.0f;
        float wscale = rem_bri * bri_mult * lean * rem_w;  if (wscale > 1.0f) wscale = 1.0f;
        float v;
        v = scale * cr;  id(d2_r).set_level(v * v);
        v = scale * cg;  id(d2_g).set_level(v * v);
        v = scale * cb;  id(d2_b).set_level(v * v);
        v = wscale;      id(d2_w).set_level(v * v);
      }
      {
        float lean = lean_d3;
        float led_hue = hue + global_hue_shift + (lean - 1.0f) * wind * 0.05f;
        if (led_hue < 0.0f) led_hue = 0.0f;
        if (led_hue > 1.0f) led_hue = 1.0f;
        float sat_led = sat + global_sat_boost + (1.0f - lean) * wind * 0.10f;
        if (sat_led > 1.0f) sat_led = 1.0f;
        float h6 = led_hue * 6.0f; int hi = (int)h6; float f = h6 - (float)hi;
        float p = val_h*(1.0f-sat_led), q = val_h*(1.0f-sat_led*f), t = val_h*(1.0f-sat_led*(1.0f-f));
        float cr, cg, cb;
        switch (hi % 6) {
          case 0: cr=val_h; cg=t;     cb=p;     break;
          case 1: cr=q;     cg=val_h; cb=p;     break;
          case 2: cr=p;     cg=val_h; cb=t;     break;
          case 3: cr=p;     cg=q;     cb=val_h; break;
          case 4: cr=t;     cg=p;     cb=val_h; break;
          default:cr=val_h; cg=p;     cb=q;     break;
        }
        float scale = rem_bri * bri_mult * lean * rem_col; if (scale > 1.0f) scale = 1.0f;
        float wscale = rem_bri * bri_mult * lean * rem_w;  if (wscale > 1.0f) wscale = 1.0f;
        float v;
        v = scale * cr;  id(d3_r).set_level(v * v);
        v = scale * cg;  id(d3_g).set_level(v * v);
        v = scale * cb;  id(d3_b).set_level(v * v);
        v = wscale;      id(d3_w).set_level(v * v);
      }
      {
        float lean = lean_d4;
        float led_hue = hue + global_hue_shift + (lean - 1.0f) * wind * 0.05f;
        if (led_hue < 0.0f) led_hue = 0.0f;
        if (led_hue > 1.0f) led_hue = 1.0f;
        float sat_led = sat + global_sat_boost + (1.0f - lean) * wind * 0.10f;
        if (sat_led > 1.0f) sat_led = 1.0f;
        float h6 = led_hue * 6.0f; int hi = (int)h6; float f = h6 - (float)hi;
        float p = val_h*(1.0f-sat_led), q = val_h*(1.0f-sat_led*f), t = val_h*(1.0f-sat_led*(1.0f-f));
        float cr, cg, cb;
        switch (hi % 6) {
          case 0: cr=val_h; cg=t;     cb=p;     break;
          case 1: cr=q;     cg=val_h; cb=p;     break;
          case 2: cr=p;     cg=val_h; cb=t;     break;
          case 3: cr=p;     cg=q;     cb=val_h; break;
          case 4: cr=t;     cg=p;     cb=val_h; break;
          default:cr=val_h; cg=p;     cb=q;     break;
        }
        float scale = rem_bri * bri_mult * lean * rem_col; if (scale > 1.0f) scale = 1.0f;
        float wscale = rem_bri * bri_mult * lean * rem_w;  if (wscale > 1.0f) wscale = 1.0f;
        float v;
        v = scale * cr;  id(d4_r).set_level(v * v);
        v = scale * cg;  id(d4_g).set_level(v * v);
        v = scale * cb;  id(d4_b).set_level(v * v);
        v = wscale;      id(d4_w).set_level(v * v);
      }
